name: Build images
concurrency:
  group: ${{ github.workflow }}

on:
  push:
    branches: ["main"]
    paths:
    - 'src/WebApp/**'
    - '.github/workflows/build_web_image.yml'
  pull_request:
    branches: ["main"]
    paths:
    - 'src/WebApp/**'
    - '.github/workflows/build_web_image.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  build_job:
    runs-on: ubuntu-latest
    name: Build and deploy to ACR
    environment: dev
    env:
      image_name: tgc-atdk-app
      app_path: src/WebApp/asgerthyregoddk
      sccr_registry: rg.fr-par.scw.cloud/crn-shared-dev-scr-lz-fr-par

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Set up Helm
      uses: azure/setup-helm@v3

    - name: Login to ACR
      run: docker login ${{ env.sccr_registry }} -u nologin --password-stdin <<< "${{ secrets.ASGERTHYREGODDK_PRD_DEPLOYMENT_SECRET_ACCESS_KEY }}"

    - name: Generate version
      id: version
      shell: pwsh
      run: ./.github/scripts/generate_version.ps1

    - name: Build and publish webapp to ACR
      run: |
        TAGS="--tag ${{ env.sccr_registry }}/${{ env.image_name }}:${{ steps.version.outputs.version }}"
        if [ "${{ github.ref }}" = "refs/heads/main" ]; then
          TAGS="$TAGS --tag ${{ env.sccr_registry }}/${{ env.image_name }}:latest"
        fi
        docker buildx build . \
          --platform linux/amd64,linux/arm64 \
          $TAGS \
          --push
      working-directory: ${{ env.app_path }}
    
    - name: Tag commit
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag ${{ steps.version.outputs.version }}
        git push origin ${{ steps.version.outputs.version }}