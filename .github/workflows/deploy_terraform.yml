name: Deploy Terraform

on:
  push:
    branches: ["main"]
    paths:
      - 'terraform/infrastructure/**'
  pull_request:
    branches: ["main"]
  workflow_dispatch:


permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  build_job:
    runs-on: ubuntu-latest
    environment: prd
    name: Deploy infrastructure
    defaults:
      run:
        working-directory: ./terraform/infrastructure
    
    env:
      SCW_ACCESS_KEY: "${{ secrets.ASGERTHYREGODDK_PRD_DEPLOYMENT_ACCESS_KEY }}"
      SCW_SECRET_KEY: "${{ secrets.ASGERTHYREGODDK_PRD_DEPLOYMENT_SECRET_ACCESS_KEY }}"

    steps:
    - uses: actions/checkout@v3

    - name: Install Terraform
      run: bash "${{ github.workspace }}/.github/scripts/install_terraform.sh" 

    - name: Terraform Fmt
      run: terraform fmt -check

    - name: Terraform Init
      run: |
        terraform init \
        -backend-config=access_key="${{ secrets.ASGERTHYREGODDK_PRD_STATE_ACCESS_KEY }}" \
        -backend-config=secret_key="${{ secrets.ASGERTHYREGODDK_PRD_STATE_SECRET_ACCESS_KEY }}" \
        -backend-config=bucket="${{ secrets.ASGERTHYREGODDK_PRD_STATE_BUCKET_NAME }}" \
        -backend-config=key="statefiles/asgerthyregoddk.prd.tfstate"
        
    - name: Terraform Validate
      run: terraform validate

    - name: Terraform Plan
      id: plan
      run: terraform plan -input=false -var-file="envs/vars.prd.tfvars" -out=tfplan

    - name: Terraform Apply
      run: terraform apply -auto-approve tfplan