name: Generate Kubernetes manifests

on:
  push:
    paths:
      - 'helm/**'
      - '.github/workflows/deploy_kubernetes.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to generate manifests for'
        required: true
        type: choice
        options:
          - dev
          - prd

permissions:
  id-token: write
  contents: write

jobs:
  generate-dev:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    runs-on: ubuntu-latest
    name: Generate DEV manifests

    steps:
      - uses: actions/checkout@v4
        with:
          path: asgerthyregoddk

      - name: Checkout ArgoCD repo
        uses: actions/checkout@v4
        with:
          repository: aatrisgn/TGC.ArgoCD
          token: ${{ secrets.TESTING }}
          path: argocd
      
      - name: Render manifests
        run: |
          helm template backend ./helm \
            -f ./helm/values-dev.yaml \
            --output-dir ./deployment/dev

      - name: Commit rendered manifests
        run: |
          cp -r asgerthyregoddk/deployment/dev/backend/templates/*  ./argocd/asgerthyregoddk/dev/

          cd argocd && git pull
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git diff --cached --quiet || git commit -m "chore: render dev manifests [${{ github.sha }}] [skip ci]"
          git push

  generate-prd:
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && github.event.inputs.environment == 'prd'
    runs-on: ubuntu-latest
    name: Generate PRD manifests

    steps:
      - uses: actions/checkout@v3

      - name: Set up Helm
        uses: azure/setup-helm@v3

      - name: Render manifests
        run: |
          helm template backend ./helm \
            -f ./helm/values-prd.yaml \
            --set image.tag=${{ github.sha }} \
            --output-dir ./deployment/prd

      - name: Commit rendered manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployment/prd/
          git diff --cached --quiet || git commit -m "chore: render prd manifests [${{ github.sha }}] [skip ci]"
          git push
