name: Generate Kubernetes manifests

on:
  push:
    paths:
      - 'helm/**'
      - '.github/workflows/deploy_kubernetes.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to generate manifests for'
        required: true
        type: choice
        options:
          - dev
          - prd
      version:
        description: 'Image tag to deploy (defaults to latest tag in ACR)'
        required: false
        default: 'latest'
        type: string

permissions:
  id-token: write
  contents: write

jobs:
  generate-dev:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    runs-on: ubuntu-latest
    name: Generate DEV manifests
    environment: dev

    steps:
      - uses: actions/checkout@v4
        with:
          path: asgerthyregoddk

      - name: Checkout ArgoCD repo
        uses: actions/checkout@v4
        with:
          repository: aatrisgn/TGC.ArgoCD
          token: ${{ secrets.TESTING }}
          path: argocd

      - name: 'Az CLI login'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ASGERTHYREGODDK_DEV_CLIENT_ID }}
          tenant-id: ${{ secrets.ASGERTHYREGODDK_DEV_TENANT_ID }}
          subscription-id: ${{ secrets.ASGERTHYREGODDK_DEV_SUBSCRIPTION_ID }}

      - name: Resolve image tag
        id: resolve_tag
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"
          if [ -z "$INPUT_VERSION" ] || [ "$INPUT_VERSION" = "latest" ]; then
            TAG=$(az acr repository show-tags \
              --name tgclzdevacr \
              --repository tgc-atdk-app \
              --orderby time_desc \
              --top 1 \
              --output tsv)
          else
            TAG="$INPUT_VERSION"
          fi
          echo "Resolved image tag: $TAG"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Set up Helm
        uses: azure/setup-helm@v3

      - name: Render manifests
        run: |
          helm template backend ./helm \
            -f ./helm/values-dev.yaml \
            --set image.tag=${{ steps.resolve_tag.outputs.tag }} \
            --output-dir ./deployment/dev
        working-directory: asgerthyregoddk

      - name: Commit rendered manifests
        run: |
          cp -r asgerthyregoddk/deployment/dev/backend/templates/* ./argocd/asgerthyregoddk/dev/

          cd argocd && git pull
          git config user.name "github-actions[TGC.AsgerThyregodDK bot]"
          git config user.email "github-actions[TGC.AsgerThyregodDK bot]@users.noreply.github.com"

          git add .
          git diff --cached --quiet || git commit -m "[TGC.AsgerThyregodDK bot] chore: render dev manifests [${{ steps.resolve_tag.outputs.tag }}]"
          git push

  generate-prd:
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && github.event.inputs.environment == 'prd'
    runs-on: ubuntu-latest
    name: Generate PRD manifests

    steps:
      - uses: actions/checkout@v4
        with:
          path: asgerthyregoddk

      - name: Checkout ArgoCD repo
        uses: actions/checkout@v4
        with:
          repository: aatrisgn/TGC.ArgoCD
          token: ${{ secrets.TESTING }}
          path: argocd

      - name: Az CLI login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ASGERTHYREGODDK_PRD_CLIENT_ID }}
          tenant-id: ${{ secrets.ASGERTHYREGODDK_PRD_TENANT_ID }}
          subscription-id: ${{ secrets.ASGERTHYREGODDK_PRD_SUBSCRIPTION_ID }}

      - name: Resolve image tag
        id: resolve_tag
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"
          if [ -z "$INPUT_VERSION" ] || [ "$INPUT_VERSION" = "latest" ]; then
            TAG=$(az acr repository show-tags \
              --name tgclzdevacr \
              --repository tgc-atdk-app \
              --orderby time_desc \
              --top 1 \
              --output tsv)
          else
            TAG="$INPUT_VERSION"
          fi
          echo "Resolved image tag: $TAG"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Set up Helm
        uses: azure/setup-helm@v3

      - name: Render manifests
        run: |
          helm template backend ./helm \
            -f ./helm/values-prd.yaml \
            --set image.tag=${{ steps.resolve_tag.outputs.tag }} \
            --output-dir ./deployment/prd
        working-directory: asgerthyregoddk

      - name: Commit rendered manifests
        run: |
          cp -r asgerthyregoddk/deployment/prd/backend/templates/* ./argocd/asgerthyregoddk/prd/

          cd argocd && git pull
          git config user.name "github-actions[TGC.AsgerThyregodDK bot]"
          git config user.email "github-actions[TGC.AsgerThyregodDK bot]@users.noreply.github.com"

          git add .
          git diff --cached --quiet || git commit -m "[TGC.AsgerThyregodDK bot] chore: render prd manifests [${{ steps.resolve_tag.outputs.tag }}]"
          git push
