<section id="experience" class="section">
  <div class="container item-container">
    <h2>Professional Experience</h2>
    <div class="timeline">
      <div
        *ngFor="let exp of experiences; let i = index"
        class="timeline-item"
        (click)="open(exp)"
        role="button"
        tabindex="0"
        (keydown.enter)="open(exp)"
        (keydown.space)="open(exp)"
        [attr.aria-label]="exp.title + ' at ' + exp.company"
      >
        <div class="timeline-dot"></div>
        <div class="timeline-card">
          <span class="timeline-date">{{ exp.date }}</span>
          <h3>{{ exp.title }}</h3>
          <p class="timeline-company">{{ exp.company }}</p>
          <span class="timeline-cta">View details &rarr;</span>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Modal -->
<div class="modal-backdrop" *ngIf="selected" (click)="close()" role="dialog" aria-modal="true">
  <div class="modal" (click)="$event.stopPropagation()">
    <button class="modal-close" (click)="close()" aria-label="Close">&times;</button>
    <span class="modal-date">{{ selected.date }}</span>
    <h3 class="modal-title">{{ selected.title }}</h3>
    <p class="modal-company">{{ selected.company }}</p>
    <ul class="modal-description">
      <li *ngFor="let item of selected.description">{{ item }}</li>
    </ul>
  </div>
</div>
